<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="api-base" content="">
  <title>Prediction Market Arbitrage Bot | Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Prediction Market Arbitrage Bot</h1>
      <p class="tagline">Contact form scaffold for project communication.</p>
    </div>
  </header>

  <nav class="site-nav" aria-label="Primary">
    <div class="container">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="arbitrage.html">What is Arbitrage?</a></li>
        <li><a href="markets.html">What is a Prediction Market?</a></li>
        <li><a href="trades.html">Trades &amp; Margins</a></li>
        <li><a href="performance.html">PnL Snapshot</a></li>
        <li><a href="live-pnl-honors.html">Live PnL (Honors)</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main class="container contact-main">
    <section class="hero-image contact-hero reveal" aria-label="Contact background graphic with message form">
      <img
        src="assets/contact-bg.png"
        alt="Contact background with left project message area and open space for the form."
      >
      <div class="contact-form-shell">
        <h2>Send a Message</h2>

        <form action="#" method="post" class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>

          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="Message subject" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

          <button type="submit">Send Message</button>
          <p id="contact-status" class="status-text" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div>
        <a href="contact.html">Contact</a>
      </div>
      <p><a href="mailto:ianregister1@gmail.com">ianregister1@gmail.com</a></p>
      <p>Ian Register</p>
    </div>
  </footer>
  <script src="interactions.js"></script>
</body>
</html>
